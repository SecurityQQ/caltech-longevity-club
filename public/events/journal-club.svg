<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="150" r="200" fill="#059669" opacity="0.08"/>
  <circle cx="150" cy="650" r="150" fill="#34d399" opacity="0.06"/>

  <!-- Book/paper icon -->
  <g transform="translate(250, 180)">
    <!-- Open book shape -->
    <path d="M150 50 Q150 20 120 20 L30 20 Q10 20 10 40 L10 250 Q10 270 30 270 L120 270 Q150 270 150 240 Z" fill="none" stroke="#34d399" stroke-width="4" opacity="0.9"/>
    <path d="M150 50 Q150 20 180 20 L270 20 Q290 20 290 40 L290 250 Q290 270 270 270 L180 270 Q150 270 150 240 Z" fill="none" stroke="#34d399" stroke-width="4" opacity="0.9"/>
    <!-- Page lines -->
    <line x1="40" y1="70" x2="120" y2="70" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="100" x2="120" y2="100" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="130" x2="110" y2="130" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="160" x2="120" y2="160" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="190" x2="100" y2="190" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="70" x2="260" y2="70" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="100" x2="260" y2="100" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="130" x2="250" y2="130" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <line x1="180" y1="160" x2="260" y2="160" stroke="#34d399" stroke-width="2" opacity="0.4"/>
    <!-- Spine highlight -->
    <line x1="150" y1="20" x2="150" y2="270" stroke="#34d399" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="400" y="560" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="2">JOURNAL CLUB</text>
  <text x="400" y="620" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#34d399" letter-spacing="4">MONTHLY PAPER SERIES</text>

  <!-- Bottom line -->
  <text x="400" y="700" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#6ee7b7" opacity="0.6" letter-spacing="1">CALTECH LONGEVITY CLUB</text>
</svg>
