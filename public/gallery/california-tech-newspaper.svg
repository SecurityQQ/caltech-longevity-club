<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" fill="none">
  <rect width="600" height="450" fill="#1a1a1a"/>

  <!-- Newspaper outline -->
  <rect x="80" y="40" width="440" height="370" rx="8" fill="#f5f0e8" opacity="0.95"/>

  <!-- Header bar -->
  <rect x="80" y="40" width="440" height="60" rx="8" fill="#f5f0e8"/>
  <line x1="80" y1="100" x2="520" y2="100" stroke="#8B4513" stroke-width="2"/>
  <line x1="80" y1="104" x2="520" y2="104" stroke="#8B4513" stroke-width="0.5"/>

  <!-- Newspaper title -->
  <text x="300" y="80" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-weight="700" fill="#1a1a1a" font-style="italic">The California Tech</text>

  <!-- Date -->
  <text x="300" y="120" text-anchor="middle" font-family="'Georgia', serif" font-size="10" fill="#666">Tuesday, February 24, 2026</text>

  <!-- Headline -->
  <text x="100" y="155" font-family="'Georgia', serif" font-size="16" font-weight="700" fill="#1a1a1a">Innovating Through Irritation</text>
  <text x="100" y="175" font-family="'Georgia', serif" font-size="16" font-weight="700" fill="#1a1a1a">with Dr. Jordan Shlain</text>

  <!-- Byline -->
  <text x="100" y="200" font-family="'Georgia', serif" font-size="9" fill="#666">Damian R. Wilson | Science &amp; Tech</text>

  <!-- Column lines (simulating text) -->
  <g opacity="0.3">
    <rect x="100" y="215" width="170" height="4" rx="2" fill="#333"/>
    <rect x="100" y="225" width="170" height="4" rx="2" fill="#333"/>
    <rect x="100" y="235" width="150" height="4" rx="2" fill="#333"/>
    <rect x="100" y="245" width="170" height="4" rx="2" fill="#333"/>
    <rect x="100" y="255" width="160" height="4" rx="2" fill="#333"/>
    <rect x="100" y="265" width="170" height="4" rx="2" fill="#333"/>
    <rect x="100" y="275" width="140" height="4" rx="2" fill="#333"/>
    <rect x="100" y="285" width="170" height="4" rx="2" fill="#333"/>
    <rect x="100" y="295" width="155" height="4" rx="2" fill="#333"/>
    <rect x="100" y="305" width="170" height="4" rx="2" fill="#333"/>
    <rect x="100" y="315" width="130" height="4" rx="2" fill="#333"/>

    <rect x="290" y="215" width="170" height="4" rx="2" fill="#333"/>
    <rect x="290" y="225" width="170" height="4" rx="2" fill="#333"/>
    <rect x="290" y="235" width="150" height="4" rx="2" fill="#333"/>
    <rect x="290" y="245" width="170" height="4" rx="2" fill="#333"/>
    <rect x="290" y="255" width="160" height="4" rx="2" fill="#333"/>
    <rect x="290" y="265" width="170" height="4" rx="2" fill="#333"/>
    <rect x="290" y="275" width="145" height="4" rx="2" fill="#333"/>
    <rect x="290" y="285" width="170" height="4" rx="2" fill="#333"/>
    <rect x="290" y="295" width="155" height="4" rx="2" fill="#333"/>
    <rect x="290" y="305" width="170" height="4" rx="2" fill="#333"/>
    <rect x="290" y="315" width="135" height="4" rx="2" fill="#333"/>
  </g>

  <!-- Photo placeholder area -->
  <rect x="290" y="330" width="210" height="65" rx="4" fill="#ddd"/>
  <text x="395" y="367" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Caltech Longevity Club members with speaker</text>

  <!-- CLC mention highlight -->
  <rect x="100" y="340" width="170" height="50" rx="4" fill="#8B4513" opacity="0.08"/>
  <text x="105" y="360" font-family="'Georgia', serif" font-size="8" fill="#8B4513" font-weight="600">Caltech Longevity Club</text>
  <text x="105" y="375" font-family="'Georgia', serif" font-size="7" fill="#666">Full-page feature in Caltech's</text>
  <text x="105" y="385" font-family="'Georgia', serif" font-size="7" fill="#666">student newspaper</text>
</svg>
